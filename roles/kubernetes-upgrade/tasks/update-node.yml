- name: Upgrade packages
  ansible.builtin.import_tasks: update-repositories.yml

- name: Get latest specified version (Debian/Ubuntu)
  when: ansible_facts.os_family == "Debian"
  block:
  - name: Get latest specified version of kubeadm, kubelet and kubectl
    changed_when: true
    register: k8s_version_temp
    ansible.builtin.shell:
      cmd: |
        set -eo pipefail
        apt-cache madison kubeadm | grep "{{ version }}" | head -n 1 | awk '{print $3}'
      executable: /bin/bash

  - name: Set k8s_version fact
    ansible.builtin.set_fact:
      k8s_version: "{{ k8s_version_temp.stdout }}"

  - name: Update kubeadm k8s_version
    ansible.builtin.apt:
      allow_change_held_packages: true
      name: kubeadm={{ k8s_version }}
      state: present

  - name: Hold kubeadm
    with_items:
    - kubeadm
    ansible.builtin.dpkg_selections:
      name: "{{ item }}"
      selection: hold

- name: Get latest specified version (RedHat/Rocky/Alma/Fedora)
  when: ansible_facts.os_family == "RedHat"
  block:
  - name: Get latest specified version of kubeadm, kubelet and kubectl
    changed_when: true
    register: k8s_version_temp
    ansible.builtin.shell:
      cmd: |
        set -eo pipefail
        dnf list --showduplicates kubeadm | grep "{{ version }}" | head -n 1 | awk '{print $2}' | cut -d ':' -f 2
      executable: /bin/bash

  - name: Set k8s_version fact
    ansible.builtin.set_fact:
      k8s_version: "{{ k8s_version_temp.stdout }}"

  - name: Remove kubeadm version lock
    changed_when: false
    ansible.builtin.command:
      cmd: dnf versionlock delete kubeadm

  - name: Update kubeadm k8s_version
    ansible.builtin.dnf:
      name: kubeadm-{{ k8s_version }}
      state: present

  - name: Hold kubeadm
    changed_when: false
    ansible.builtin.command:
      cmd: dnf versionlock add kubeadm

- name: Get kubeadm version
  changed_when: false
  register: kubeadm_version
  ansible.builtin.command: kubeadm version -o short

- name: Update control plane configuration files for new version
  when:
  - inventory_hostname in groups['control_planes']
  ansible.builtin.include_role:
    name: kubernetes-control-plane
    tasks_from: configure-control-plane.yml

- name: Create kubeadm upgrade config file
  when:
  - inventory_hostname in groups['control_planes']
  with_items:
  - {file: "kubeadm-upgrade.yaml.j2", destination: "{{ kubernetes_config_directory }}/kubeadm-upgrade.yaml"}
  ansible.builtin.template:
    src: "{{ item.file }}"
    dest: "{{ item.destination }}"
    owner: root
    group: root
    mode: "{{ item.mode | default('0600') }}"
    backup: false

# Workaround for etcd 3.6 membership store inconsistency (etcd-io/etcd#20967):
# v2store and v3store membership data can become inconsistent. In etcd 3.5.x, v2store is
# the source of truth so this is invisible. In etcd 3.6.x, v3store becomes the source of
# truth, causing stale/duplicate member entries to surface during WAL replay. This can
# reset the raft voter configuration and break quorum. Fixed in etcd 3.5.26 + 3.6.7, but
# K8s releases may bundle affected versions. Forcing a raft snapshot before upgrade ensures
# stale ConfChange entries are truncated from the WAL, preventing the issue regardless of
# etcd version. This is a safe no-op on unaffected versions.
# See: https://github.com/etcd-io/etcd/issues/20967
- name: Read etcd static pod manifest
  register: etcd_manifest_raw
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.slurp:
    src: "/etc/kubernetes/manifests/etcd.yaml"

- name: Determine etcd snapshot-count from manifest
  vars:
    etcd_manifest: "{{ etcd_manifest_raw.content | b64decode | from_yaml }}"
    etcd_command: "{{ etcd_manifest.spec.containers[0].command }}"
    snapshot_args: "{{ etcd_command | select('match', '^--snapshot-count=') | list }}"
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.set_fact:
    etcd_snapshot_count: "{{ (snapshot_args | first | split('='))[1] if snapshot_args | length > 0 else '10000' }}"

- name: Find running etcd container
  changed_when: false
  failed_when: etcd_container_result.stdout_lines | length == 0
  register: etcd_container_result
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.command:
    cmd: crictl ps --name etcd -q

- name: Set etcd connection facts
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.set_fact:
    etcd_container: "{{ etcd_container_result.stdout_lines[0] }}"
    etcd_ctl: >-
      crictl exec {{ etcd_container_result.stdout_lines[0] }} etcdctl
      --endpoints=https://127.0.0.1:2379
      --cacert=/etc/kubernetes/pki/etcd/ca.crt
      --cert=/etc/kubernetes/pki/etcd/server.crt
      --key=/etc/kubernetes/pki/etcd/server.key

- name: Write entries to force etcd raft snapshot
  changed_when: true
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      WRITE_COUNT=$(( {{ etcd_snapshot_count }} + 1 ))
      echo "Writing ${WRITE_COUNT} entries to force raft snapshot (snapshot-count={{ etcd_snapshot_count }})..."
      for i in $(seq 1 "${WRITE_COUNT}"); do
        {{ etcd_ctl }} put "/pre-upgrade-snapshot/${i}" x >/dev/null 2>&1 &
        if (( i % 20 == 0 )); then wait; fi
      done
      wait
    executable: /bin/bash

- name: Wait for raft snapshot to be written to disk
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.pause:
    seconds: 5

- name: Clean up snapshot trigger keys
  changed_when: true
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.shell:
    cmd: "{{ etcd_ctl }} del /pre-upgrade-snapshot/ --prefix"
    executable: /bin/bash

- name: Get current etcd revision
  changed_when: false
  register: etcd_status_result
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.shell:
    cmd: "{{ etcd_ctl }} endpoint status -w json"
    executable: /bin/bash

- name: Set etcd revision fact
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.set_fact:
    etcd_revision: "{{ (etcd_status_result.stdout | from_json)[0].Status.header.revision }}"

- name: Compact etcd to current revision
  changed_when: true
  failed_when: false
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.shell:
    cmd: "{{ etcd_ctl }} compact {{ etcd_revision }}"
    executable: /bin/bash

- name: Defragment etcd storage
  changed_when: true
  failed_when: false
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.shell:
    cmd: "{{ etcd_ctl }} defrag"
    executable: /bin/bash
# End of workaround for etcd membership store inconsistency

- name: Upgrade kubernetes primary control plane node
  changed_when: true
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.command: kubeadm upgrade apply {{ kubeadm_version.stdout }} --config {{ kubernetes_config_directory }}/kubeadm-upgrade.yaml --yes

- name: Wait for etcd to stabilize after primary control plane upgrade
  changed_when: false
  delay: 2
  register: etcd_health_primary
  retries: 300
  until: etcd_health_primary.rc == 0
  when: first_kube_control_plane == inventory_hostname
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      ETCD_CONTAINER=$(crictl ps --name etcd -q | head -1)
      [ -z "${ETCD_CONTAINER}" ] && exit 1
      crictl exec "${ETCD_CONTAINER}" etcdctl \
        --endpoints=https://127.0.0.1:2379 \
        --cacert=/etc/kubernetes/pki/etcd/ca.crt \
        --cert=/etc/kubernetes/pki/etcd/server.crt \
        --key=/etc/kubernetes/pki/etcd/server.key \
        endpoint health 2>&1 | grep -q "is healthy"
    executable: /bin/bash

- name: Upgrade Kubernetes non-primary control plane node
  changed_when: true
  when:
  - first_kube_control_plane != inventory_hostname
  - inventory_hostname in groups['control_planes']
  ansible.builtin.command: kubeadm upgrade node --config {{ kubernetes_config_directory }}/kubeadm-upgrade.yaml

- name: Wait for etcd to stabilize after secondary control plane upgrade
  changed_when: false
  delay: 2
  register: etcd_health_secondary
  retries: 150
  until: etcd_health_secondary.rc == 0
  when:
  - first_kube_control_plane != inventory_hostname
  - inventory_hostname in groups['control_planes']
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      ETCD_CONTAINER=$(crictl ps --name etcd -q | head -1)
      [ -z "${ETCD_CONTAINER}" ] && exit 1
      crictl exec "${ETCD_CONTAINER}" etcdctl \
        --endpoints=https://127.0.0.1:2379 \
        --cacert=/etc/kubernetes/pki/etcd/ca.crt \
        --cert=/etc/kubernetes/pki/etcd/server.crt \
        --key=/etc/kubernetes/pki/etcd/server.key \
        endpoint health 2>&1 | grep -q "is healthy"
    executable: /bin/bash

- name: Wait for API server to be healthy after control plane upgrade
  changed_when: false
  delay: 2
  register: api_health_secondary
  retries: 150
  until: api_health_secondary.rc == 0
  when:
  - first_kube_control_plane != inventory_hostname
  - inventory_hostname in groups['control_planes']
  ansible.builtin.command:
    cmd: kubectl get --raw /healthz --server=https://{{ ansible_default_ipv4.address }}:6443 --kubeconfig /etc/kubernetes/admin.conf

- name: Verify control plane pods are running after upgrade
  changed_when: false
  delay: 2
  register: cp_pods_check
  retries: 300
  until: cp_pods_check.rc == 0
  when: inventory_hostname in groups['control_planes']
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      ! kubectl get pods -n kube-system -l tier=control-plane --kubeconfig /etc/kubernetes/admin.conf --no-headers | grep -qv Running
    executable: /bin/bash

- name: Pause to allow etcd cluster to stabilize
  when:
  - inventory_hostname in groups['control_planes']
  ansible.builtin.pause:
    seconds: 10

- name: Upgrade worker nodes
  changed_when: true
  when:
  - inventory_hostname not in groups['control_planes']
  ansible.builtin.command: kubeadm upgrade node

- name: Drain Kubernetes node
  changed_when: true
  delegate_to: "{{ first_kube_control_plane }}"
  ansible.builtin.shell:
    cmd: |
      kubectl drain {{ inventory_hostname_short }} --ignore-daemonsets --delete-emptydir-data --force --grace-period=30 --kubeconfig /etc/kubernetes/admin.conf

- name: Update kubelet and kubectl (Debian/Ubuntu)
  when: ansible_facts.os_family == "Debian"
  block:
  - name: Update kubelet and kubectl to specified k8s_version
    with_items:
    - kubelet={{ k8s_version }}
    - kubectl={{ k8s_version }}
    ansible.builtin.apt:
      allow_change_held_packages: true
      name: "{{ item }}"
      state: present

  - name: Upgrade containerd to latest version
    ansible.builtin.apt:
      allow_change_held_packages: true
      name: containerd.io
      only_upgrade: true
      state: latest

  - name: Reconfigure containerd for new version
    ansible.builtin.include_role:
      name: containerd
      tasks_from: configure-containerd.yml

  - name: Hold kubelet, kubectl and containerd.io
    with_items:
    - kubelet
    - kubectl
    - containerd.io
    ansible.builtin.dpkg_selections:
      name: "{{ item }}"
      selection: hold

- name: Update kubelet and kubectl (RedHat/Rocky/Alma/Fedora)
  when: ansible_facts.os_family == "RedHat"
  block:
  - name: Remove version locks
    changed_when: true
    with_items:
    - kubelet
    - kubectl
    - containerd.io
    ansible.builtin.command:
      cmd: dnf versionlock delete {{ item }}

  - name: Update kubelet and kubectl to specified k8s_version
    with_items:
    - kubelet-{{ k8s_version }}
    - kubectl-{{ k8s_version }}
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present

  - name: Upgrade containerd to the latest version
    ansible.builtin.dnf:
      name: containerd.io
      state: latest  # noqa: package-latest

  - name: Reconfigure containerd for new version
    ansible.builtin.include_role:
      name: containerd
      tasks_from: configure-containerd.yml

  - name: Hold kubelet, kubectl and containerd.io
    changed_when: true
    with_items:
    - kubelet
    - kubectl
    - containerd.io
    ansible.builtin.command:
      cmd: dnf versionlock add {{ item }}

- name: Reload kubelet
  ansible.builtin.systemd_service:
    daemon_reload: true
    enabled: true
    name: kubelet
    state: restarted

- name: Uncordon kubernetes node
  changed_when: true
  delay: 5
  delegate_to: "{{ first_kube_control_plane }}"
  register: uncordon_result
  retries: 60
  until: uncordon_result.rc == 0
  ansible.builtin.command:
    cmd: kubectl uncordon {{ inventory_hostname_short }} --kubeconfig /etc/kubernetes/admin.conf

- name: Wait for kubernetes node to be ready
  changed_when: false
  delay: 5
  delegate_to: "{{ first_kube_control_plane }}"
  register: node_ready
  retries: 60
  until: node_ready.rc == 0
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=Ready node/{{ inventory_hostname_short }} --timeout=30s --kubeconfig /etc/kubernetes/admin.conf
