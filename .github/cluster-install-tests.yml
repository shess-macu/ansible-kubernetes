name: Cluster Install Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    # inputs:
    #   kubernetes_version:
    #     description: 'Kubernetes version to test (e.g., 1.35)'
    #     required: false
    #     type: choice
    #     options:
    #       - "1.33"
    #       # - "1.34"
    #       # - "1.35"
    #   os_image:
    #     description: 'OS image to test'
    #     required: false
    #     type: choice
    #     options:
    #       - ubuntu-24.04
    #       # - ubuntu-25.10
    #       # - centos9
    #       # - centos10

env:
  # Set the working directory for all scripts
  WORKING_DIR: ci-cd/test

jobs:
  install-cluster:
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    name: Test K8s ${{ matrix.kubernetes_version }} on ${{ matrix.os_image }}
    runs-on:
      group: Default
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        kubernetes_version:
          - "1.33"
          # - "1.34"
          # - "1.35"
        os_image:
          - ubuntu-24.04
          # - ubuntu-25.10
          # - centos9
          # - centos10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: ./install-dependencies.sh

      - name: Spin up test environment
        run: ./spin-up-test-environment.sh --os-image ${{ matrix.os_image }}
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Install Kubernetes cluster
        run: ./install.sh -v ${{ matrix.kubernetes_version }}

      - name: Verify cluster health
        run: ./verify-cluster-health.sh ${{ matrix.kubernetes_version }}

      - name: Run smoke tests
        run: ./run-smoke-tests.sh

      - name: Collect logs on failure
        if: failure()
        run: ./collect-logs.sh

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kubernetes_version }}-${{ matrix.os_image }}
          path: /tmp/logs/${{ github.run_number }}/
          retention-days: 7

      - name: Cleanup test environment
        if: always()
        run: ./shutdown-test-environment.sh || true

  # Summary job that depends on all test jobs
  test-summary:
    name: Test Summary
    runs-on:
      group: Default
    needs: install-cluster
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.install-cluster.result }}" != "success" ]; then
            echo "::error::Some tests failed. Check the install-cluster job for details."
            exit 1
          fi
          echo "All tests passed successfully!"
